# ================================================================
# ix-copilot — Local Development Stack
#
# Usage:
#   docker compose up -d              # start everything
#   docker compose up -d --build      # rebuild & start
#   docker compose logs -f            # tail all logs
#   docker compose down               # stop everything
#   docker compose down -v            # stop & remove volumes (data loss!)
# ================================================================

services:
  # ── Infrastructure ─────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arc_db
    ports:
      - '6433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Creates arc_audit_db + arc_insights_db on first boot (POSTGRES_DB
      # already auto-creates arc_db). Idempotent because volume persists.
      - ./docker/postgres/init-databases.sh:/docker-entrypoint-initdb.d/10-init-databases.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d arc_db']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '7380:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '9025:8025' # Web UI
      - '2025:1025' # SMTP
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # ── Database Migrations (runs once, then exits) ────────────────

  migrate:
    build:
      context: .
      target: source
    # Foundation services (tenant, users, auth, license) migrate against
    # arc_db. Audit-service migrates against arc_audit_db — we override
    # DATABASE_URL just for that command.
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/arc_db?schema=public
      AUDIT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/arc_audit_db?schema=public
    command: >
      sh -c "
        echo '── Running migrations on arc_db ──' &&
        cd apps/tenant-service  && npx prisma migrate deploy && cd ../.. &&
        cd apps/users-service   && npx prisma migrate deploy && cd ../.. &&
        cd apps/auth-service    && npx prisma migrate deploy && cd ../.. &&
        cd apps/license-service && npx prisma migrate deploy && cd ../.. &&
        echo '── Running migrations on arc_audit_db ──' &&
        cd apps/audit-service   && DATABASE_URL=$$AUDIT_DATABASE_URL npx prisma migrate deploy && cd ../.. &&
        echo '── All migrations complete ──'
      "
    depends_on:
      postgres:
        condition: service_healthy

  # ── Microservices ──────────────────────────────────────────────

  tenant-service:
    build:
      context: .
      args:
        SERVICE_NAME: tenant-service
    restart: unless-stopped
    env_file: .env.docker
    ports:
      - '6003:6003' # HTTP (Swagger)
      - '5003:5003' # TCP  (inter-service)
    depends_on:
      migrate:
        condition: service_completed_successfully

  users-service:
    build:
      context: .
      args:
        SERVICE_NAME: users-service
    restart: unless-stopped
    env_file: .env.docker
    ports:
      - '6004:6004' # HTTP
      - '5004:5004' # TCP
    depends_on:
      migrate:
        condition: service_completed_successfully

  audit-service:
    build:
      context: .
      args:
        SERVICE_NAME: audit-service
    restart: unless-stopped
    env_file: .env.docker
    # audit-service runs on arc_audit_db. AUDIT_DATABASE_URL comes from
    # .env.docker; we re-export it as DATABASE_URL because Prisma reads
    # that name. Foundation services pick up the unaltered DATABASE_URL.
    environment:
      DATABASE_URL: ${AUDIT_DATABASE_URL}
    ports:
      - '6002:6002' # HTTP
      - '5002:5002' # TCP
    depends_on:
      migrate:
        condition: service_completed_successfully

  auth-service:
    build:
      context: .
      args:
        SERVICE_NAME: auth-service
    restart: unless-stopped
    env_file: .env.docker
    environment:
      # JWT secrets come from .env.docker (gitignored)
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
      # TCP client hosts (connect to other containers by service name)
      USERS_SERVICE_HOST: users-service
      TENANT_SERVICE_HOST: tenant-service
      AUDIT_SERVICE_HOST: audit-service
      # SMTP (hardcoded to mailpit container for local Docker dev)
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_USER: dev
      SMTP_PASS: dev
      SMTP_FROM: IX Platform <noreply@ix-copilot.local>
    ports:
      - '6001:6001' # HTTP
      - '5001:5001' # TCP
    depends_on:
      migrate:
        condition: service_completed_successfully
      users-service:
        condition: service_started
      tenant-service:
        condition: service_started
      audit-service:
        condition: service_started
      mailpit:
        condition: service_started

  license-service:
    build:
      context: .
      args:
        SERVICE_NAME: license-service
    restart: unless-stopped
    env_file: .env.docker
    environment:
      # Redis (container service name)
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      # On-prem license (disabled in Docker by default)
      ON_PREM: 'false'
      # TCP client hosts
      TENANT_SERVICE_HOST: tenant-service
      AUDIT_SERVICE_HOST: audit-service
    ports:
      - '6005:6005' # HTTP
      - '5005:5005' # TCP
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      tenant-service:
        condition: service_started

  admin-portal:
    build:
      context: .
      args:
        SERVICE_NAME: admin-portal
    restart: unless-stopped
    env_file: .env.docker
    environment:
      # TCP client hosts (connect to other containers by service name)
      TENANT_SERVICE_HOST: tenant-service
      USERS_SERVICE_HOST: users-service
      LICENSE_SERVICE_HOST: license-service
      AUTH_SERVICE_HOST: auth-service
      AUDIT_SERVICE_HOST: audit-service
      # SMTP (hardcoded to mailpit container for local Docker dev)
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_SECURE: 'false'
      SMTP_USER: dev
      SMTP_PASS: dev
      SMTP_FROM: IX Platform <noreply@ix-copilot.local>
    ports:
      - '6006:6006' # HTTP (Swagger)
      - '5006:5006' # TCP  (inter-service)
    depends_on:
      tenant-service:
        condition: service_started
      users-service:
        condition: service_started
      auth-service:
        condition: service_started
      audit-service:
        condition: service_started
      license-service:
        condition: service_started
      mailpit:
        condition: service_started

  # ── Frontend ──────────────────────────────────────────────────────

  admin-ui:
    build:
      context: .
      dockerfile: Dockerfile.nextjs
      args:
        APP_NAME: admin-ui
    restart: unless-stopped
    environment:
      # BFF internal URL (Next.js server components call admin-portal directly)
      BFF_INTERNAL_URL: http://admin-portal:6006
    ports:
      - '3200:3000' # Next.js
    depends_on:
      admin-portal:
        condition: service_started

# ── Volumes ──────────────────────────────────────────────────────

volumes:
  pgdata:
  redisdata:
